name: Auto-update formulas and casks

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update-formulas.py

      - name: Open PR if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add Formula/ Casks/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          BRANCH="auto-update/formulas-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m "chore: auto-update formula versions and SHA256 hashes"
          git push origin "$BRANCH"

          # Open a PR only if one doesn't already exist for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "chore: auto-update formula versions and SHA256 hashes" \
              --body "Automated version and SHA256 updates generated by the daily update script.

**Changed formulas/casks** (see diff for details):
$(git diff HEAD~1 --name-only | sed 's/^/- /')

---
🤖 Generated by [auto-update workflow](../../actions/workflows/auto-update.yml)"
          else
            echo "PR #$EXISTING already exists for $BRANCH, skipping."
          fi
